  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      position: relative;
      padding-top: 1rem;
      padding-bottom: 2rem;
      background: #000;
    }

    .bg-blur {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: blur(30px) brightness(0.4);
      pointer-events: none;
      user-select: none;
      z-index: 0;
      transform: scale(1.05);
    }

    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      max-width: 95vw;
      margin: 0 auto;
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      min-height: 80vh;
    }

    .cover {
      position: relative;
      height: 295px;
      overflow: hidden;
      line-height: 0;
    }

    .cover img.cover-photo {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 100%;
    }

    .cover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top,
        #000 0%,
        rgba(0,0,0,0.92) 5%,
        rgba(0,0,0,0.75) 15%,
        rgba(0,0,0,0.4) 30%,
        transparent 55%
      );
      pointer-events: none;
      z-index: 2;
    }

    .cover-info {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      padding: 0 16px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
    }

    .cover-name-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .cover-name-row h1 {
      font-size: 46px;
      font-family: Arial, sans-serif;
      font-weight: 600;
      color: #fff;
      text-shadow: 2px 2px 19px rgba(11,11,11,1);
      line-height: 1.1;
    }

    .blue-tick {
      width: 24px; height: 24px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .online-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #fff;
      border-radius: 999px;
      padding: 6px 16px 6px 12px;
      margin: 0 0 26px;
    }

    .dot-wrap { position: relative; width: 12px; height: 12px; flex-shrink: 0; }
    .dot {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgb(34,197,94);
    }
    .dot-ping {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgb(34,197,94);
      opacity: 0.7;
      animation: ping 2s cubic-bezier(0,0,0.8,1) infinite;
    }
    @keyframes ping {
      0%   { transform: scale(1); opacity: 0.7; }
      75%, 100% { transform: scale(2.2); opacity: 0; }
    }
    .online-badge span {
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 16px 28px;
    }

    .social-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .social-btn:hover { transform: scale(1.12); }
    .social-btn img {
      width: 18px; height: 18px;
      object-fit: contain;
      display: block;
    }

    .countdown-banner {
      margin: 0 16px 20px;
      background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
      border: 1.5px solid #333;
      border-radius: 20px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .countdown-left {
      display: flex;
      flex-direction: column;
      gap: 1px;
      flex: 1;
      min-width: 0;
    }

    .countdown-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #ff4d4d;
      white-space: nowrap;
    }

    .countdown-title {
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .countdown-digits {
      display: flex;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
    }

    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .cd-box {
      background: #000;
      border: 1.5px solid #333;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #fff;
    }

    .cd-label {
      font-size: 8px;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .cd-sep {
      font-size: 18px;
      font-weight: 700;
      color: #ff4d4d;
      margin-bottom: 14px;
      line-height: 1;
    }

    .links-grid {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      height: 180px;
      position: relative;
      border-radius: 46px;
      overflow: hidden;
      border: 3px solid rgb(126,126,126);
      background: #111;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
      text-decoration: none;
    }

    .link-card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .link-card img.card-bg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 100%;
      transition: filter 0.3s;
    }

    .link-card .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.5), transparent);
      opacity: 0.8;
      z-index: 1;
      transition: filter 0.3s;
    }

    .link-card .card-text {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding-bottom: 14px;
      text-align: center;
      transition: filter 0.3s;
    }

    .link-card h3 {
      font-size: 21px;
      font-weight: 600;
      color: #fff;
    }

    .link-card p {
      font-size: 15px;
      color: #d1d5db;
      font-weight: 500;
      margin-top: 4px;
    }

    /* ─── OVERLAY ─── */
    .sensitive-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
    }

    .sensitive-badge {
      background: #000000;
      color: #ffffff;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    .sensitive-badge svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ─── ÉTAT RÉVÉLÉ ─── */
    .link-card.revealed .card-bg,
    .link-card.revealed .card-gradient,
    .link-card.revealed .card-text {
      filter: blur(12px);
    }

    .link-card.revealed .sensitive-overlay {
      display: flex;
    }

    .page-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 12px;
      opacity: 0.15;
      color: rgba(255,255,255,0.9);
      padding: 20px 0 24px;
    }
    .page-footer a { color: inherit; text-decoration: underline; }

    @media (max-width: 480px) {
      .card { width: 100%; border-radius: 0; }
      .cover-name-row h1 { font-size: 38px; }
      .countdown-title { font-size: 10px; }
      .countdown-banner { padding: 8px 12px; gap: 8px; }
      .cd-box { width: 34px; height: 34px; font-size: 18px; }
      .cd-sep { font-size: 16px; margin-bottom: 12px; }
    }
  </style>
</head>

<script>
  // ── Countdown ──────────────────────────────────────────────
  const endTime = Date.now() + (24 * 3600 + 0 * 60) * 1000;

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = Math.max(0, endTime - Date.now());
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById('cd-h').textContent = pad(h);
    document.getElementById('cd-m').textContent = pad(m);
    document.getElementById('cd-s').textContent = pad(s);

    if (diff > 0) requestAnimationFrame(() => setTimeout(tick, 200));
  }

  tick();

  // ── Sensitive cards (logique simplifiée et corrigée) ───────
  (function() {
    const sensitiveCards = document.querySelectorAll('.sensitive-card');

    sensitiveCards.forEach(function(card) {
      let revealed = false;

      card.addEventListener('click', function(e) {
        if (!revealed) {
          // 1er clic : on montre l'overlay, on bloque le lien
          e.preventDefault();
          card.classList.add('revealed');
          revealed = true;
        }
        // Si déjà révélé (2e clic) : on laisse le navigateur suivre le href
        // (pas de preventDefault)
        else {
          // Tracker l'événement Facebook
          const label = card.getAttribute('data-label') || 'link';
          if (typeof fbq !== 'undefined') {
            fbq('track', 'Lead', {
              content_name: label,
              content_category: 'sensitive_content'
            });
          }
          // On remet à zéro pour la prochaine visite
          card.classList.remove('revealed');
          revealed = false;
          // Le lien s'ouvre normalement car on n'a pas appelé preventDefault()
        }
      });
    });
  })();
</script>
